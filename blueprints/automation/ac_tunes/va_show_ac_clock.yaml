blueprint:
  name: "View Assist - Show Animal Crossing Clock"
  description: >
    Navigate a View Assist satellite device to the Animal Crossing Clock
    view when a voice command is spoken. Requires the ac-clock-card to be
    set up on a ViewAssist dashboard panel view with path "ac-clock".
  domain: automation
  input:
    dashboard_path:
      name: Dashboard Path
      description: The path of your ViewAssist dashboard (e.g. dashboard-viewassist)
      default: dashboard-viewassist
      selector:
        text:
    view_path:
      name: View Path
      description: The path of the AC Clock view on the dashboard
      default: ac-clock
      selector:
        text:
    voice_commands:
      name: Voice Commands
      description: Phrases that trigger the clock view (comma-separated)
      default: "show animal crossing clock,show AC clock,animal crossing clock"
      selector:
        text:

trigger:
  - platform: conversation
    command:
      - "show animal crossing clock"
      - "show AC clock"
      - "animal crossing clock"

action:
  - service: browser_mod.navigate
    data:
      path: "/{{ dashboard_path }}/{{ view_path }}"
    target:
      device_id: "{{ trigger.device_id }}"
